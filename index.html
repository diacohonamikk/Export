<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دیاکو هونامیک | شرکت صادراتی</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Vazirmatn, sans-serif;
}

body{
    background:#ffffff;
    color:#1a1a1a;
    direction:rtl;
}

/* HEADER */
header{
    background:linear-gradient(120deg,#0b7a3b,#0f9d58);
    color:white;
    padding:60px 20px;
    text-align:center;
}

header h1{
    font-size:40px;
    margin-bottom:10px;
}

header p{
    font-size:18px;
    opacity:0.9;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#e63946;
    color:white;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

/* SECTIONS */
section{
    padding:60px 20px;
    max-width:1100px;
    margin:auto;
}

h2{
    color:#0b7a3b;
    margin-bottom:20px;
    font-size:28px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#f7f7f7;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card .content{
    padding:15px;
}

/* CONTACT */
.contact{
    background:#0b7a3b;
    color:white;
    border-radius:12px;
    padding:30px;
}

.red{
    color:#e63946;
    font-weight:bold;
}

/* FOOTER */
footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>
